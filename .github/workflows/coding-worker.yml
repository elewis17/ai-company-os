name: Coding Worker

on:
  issues:
    types: [opened]

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install openai numpy

      - name: Run coding agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LEASE_LENS_REPO_ROOT: .
        run: |
          python scripts/run_agent.py "${{ github.event.issue.title }}" "${{ github.event.issue.body }}"