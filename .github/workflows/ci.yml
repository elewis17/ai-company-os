name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: |
          if [ -f package-lock.json ]; then npm ci; else echo "No package-lock.json found"; fi
      - name: Lint
        run: |
          if [ -f package.json ]; then npm run lint --if-present; fi
      - name: Typecheck
        run: |
          if [ -f package.json ]; then npm run typecheck --if-present; fi
      - name: Test
        run: |
          if [ -f package.json ]; then npm test --if-present; fi
      - name: Build
        run: |
          if [ -f package.json ]; then npm run build --if-present; fi
